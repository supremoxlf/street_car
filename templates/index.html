<!DOCTYPE html>
<html>
<head>
    <title>Street Car</title>
</head>
<body>

<center>
    <h1>Street Car</h1>
</center>

<hr>

<div style="text-align:center; margin-bottom:20px;">
    <a href="/">🏠 Início</a> |
    <a href="/faturamento">💰 Faturamento</a>
</div>

<hr>

<h2>Adicionar Serviço</h2>

<form method="POST">
    <input type="text" name="cliente" placeholder="Cliente" required>
    <input type="text" name="veiculo" placeholder="Veículo" required>
    <input type="text" name="servico" placeholder="Serviço" required>
    <input type="number" step="0.01" name="valor" placeholder="Valor" required>
    <button type="submit">Adicionar</button>
</form>

<hr>

<h2>Serviços</h2>

<table border="1" cellpadding="5">
<tr>
    <th>ID</th>
    <th>Cliente</th>
    <th>Veículo</th>
    <th>Serviço</th>
    <th>Data</th>
    <th>Valor</th>
    <th>Total do Cliente</th>
</tr>

{% for s in servicos %}
<tr>
    <td>{{ s[0] }}</td>
    <td>{{ s[1] }}</td>
    <td>{{ s[2] }}</td>
    <td>{{ s[3] }}</td>
    <td>{{ s[4] }}</td>
    <td>R$ {{ s[5] }}</td>
    <td>{{ s[6] }}</td>
</tr>
{% endfor %}

</table>

<h3>Faturamento Total: R$ {{ faturamento }}</h3>

</body>
</html>
