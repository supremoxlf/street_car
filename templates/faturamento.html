<!DOCTYPE html>
<html>
<head>
    <title>Faturamento</title>
</head>
<body>

<h2>Faturamento Total: R$ {{ total }}</h2>

<table border="1">
<tr>
    <th>ID</th>
    <th>Cliente</th>
    <th>Veículo</th>
    <th>Serviço</th>
    <th>Data</th>
    <th>Valor</th>
</tr>

{% for s in servicos %}
<tr>
    <td>{{ s[0] }}</td>
    <td>{{ s[1] }}</td>
    <td>{{ s[2] }}</td>
    <td>{{ s[3] }}</td>
    <td>{{ s[4] }}</td>
    <td>R$ {{ s[5] }}</td>
</tr>
{% endfor %}

</table>

<br>
<a href="/">Voltar</a>

</body>
</html>
