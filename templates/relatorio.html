<!DOCTYPE html>
<html>
<head>
    <title>Street Car</title>
</head>
<body>
    <h1>🚗 Street Car - Serviços de Hoje ({{ data }})</h1>

    <h2>Novo Serviço</h2>
    <form method="POST">
        Cliente: <input type="text" name="cliente" required><br><br>
        Telefone: <input type="text" name="telefone" required><br><br>
        Tipo (Carro/Moto): <input type="text" name="tipo" required><br><br>
        Modelo: <input type="text" name="modelo" required><br><br>
        Valor: <input type="number" step="0.01" name="valor" required><br><br>
        <button type="submit">Salvar</button>
    </form>

    <h2>Serviços de Hoje</h2>
    <ul>
        {% for s in servicos %}
            <li>
                {{ s[1] }} - {{ s[3] }} - R$ {{ s[5] }}
            </li>
        {% endfor %}
    </ul>

    <h3>💰 Faturamento do dia: R$ {{ faturamento }}</h3>

    <br>
    <a href="/relatorio">Ver Relatório Mensal</a>
</body>
</html>
